<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        try {
          const key = "chronoflight-theme-preference"
          const storedPreference = window.localStorage.getItem(key)
          const preference = ["light", "dark", "system"].includes(storedPreference) ? storedPreference : "system"
          const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
          const resolvedTheme = preference === "system" ? systemTheme : preference
          document.documentElement.dataset.theme = resolvedTheme
          document.documentElement.style.colorScheme = resolvedTheme
        } catch {
          document.documentElement.dataset.theme = "light"
        }
      })()
    </script>
    <title>Chronoflight</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
